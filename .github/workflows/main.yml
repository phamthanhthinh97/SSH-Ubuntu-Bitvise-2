name: SSH-Ubuntu-Bitvise-Postgres-Web

on:
  workflow_dispatch:

jobs:
  secure-ssh-ubuntu:
    runs-on: ubuntu-latest
    timeout-minutes: 3600

    steps:
      - name: Configure SSH and Set Password
        run: |
          # Tạo mật khẩu ngẫu nhiên có độ bảo mật cao
          PASSWORD=$(date +%s | sha256sum | base64 | head -c 16)
          
          # Đặt mật khẩu cho user mặc định 'runner' của GitHub Actions
          echo "runner:$PASSWORD" | sudo chpasswd
          
          # Cho phép đăng nhập SSH bằng mật khẩu (mặc định GitHub tắt tính năng này)
          sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/g' /etc/ssh/sshd_config
          sudo systemctl restart ssh
          
          # Lưu thông tin mật khẩu vào biến môi trường
          echo "SSH_PASSWORD=$PASSWORD" >> $GITHUB_ENV

      - name: Install and Configure PostgreSQL
        run: |
          echo "=== Đang cài đặt PostgreSQL ==="
          sudo apt-get update
          sudo apt-get install -y postgresql postgresql-contrib
          
          echo "=== Khởi động và kích hoạt PostgreSQL ==="
          sudo systemctl start postgresql
          sudo systemctl enable postgresql
          
          echo "=== Đặt mật khẩu cho user 'postgres' ==="
          sudo -u postgres psql -c "ALTER USER postgres WITH PASSWORD '$SSH_PASSWORD';"
          
          echo "=== Cấu hình cho phép kết nối từ xa ==="
          PG_VERSION=$(psql --version | awk '{print $3}' | cut -d. -f1)
          sudo sed -i "s/#listen_addresses = 'localhost'/listen_addresses = '*'/g" /etc/postgresql/$PG_VERSION/main/postgresql.conf
          echo "host    all             all             0.0.0.0/0               scram-sha-256" | sudo tee -a /etc/postgresql/$PG_VERSION/main/pg_hba.conf
          
          sudo systemctl restart postgresql

      - name: Install and Configure pgAdmin 4 (Web Interface)
        run: |
          echo "=== Thêm Repo pgAdmin 4 ==="
          # Cập nhật link key mới nhất từ trang chủ pgAdmin (.org thay vì .repo)
          curl -fsS https://www.pgadmin.org/static/packages_pgadmin_org.pub | sudo gpg --dearmor -o /usr/share/keyrings/packages-pgadmin-org.gpg
          
          # Đưa key vào đúng khai báo source list
          echo "deb [signed-by=/usr/share/keyrings/packages-pgadmin-org.gpg] https://ftp.postgresql.org/pub/pgadmin/pgadmin4/apt/$(lsb_release -cs) pgadmin4 main" | sudo tee /etc/apt/sources.list.d/pgadmin4.list
          
          echo "=== Cài đặt pgAdmin4 Web ==="
          sudo apt-get update
          sudo apt-get install -y pgadmin4-web
          
          echo "=== Cấu hình Tự động cho pgAdmin 4 ==="
          # Thiết lập email đăng nhập cố định và mật khẩu dùng chung với SSH
          export PGADMIN4_SET_EMAIL="admin@gh-actions.local"
          export PGADMIN4_SET_PASSWORD="$SSH_PASSWORD"
          
          # Sửa lại đường dẫn thực thi chuẩn của gói pgadmin4-web trên Ubuntu
          sudo -E /usr/pgadmin4/bin/setup-web.sh --initial-db

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh

      - name: Establish Tailscale Connection
        run: |
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-ubuntu-ssh-$GITHUB_RUN_ID
          
          TS_IP=""
          RETRIES=0
          while [ -z "$TS_IP" ] && [ $RETRIES -lt 10 ]; do
              TS_IP=$(tailscale ip -4)
              sleep 5
              RETRIES=$((RETRIES+1))
          done
          
          if [ -z "$TS_IP" ]; then
              echo "Không lấy được IP Tailscale. Thoát."
              exit 1
          fi
          echo "TAILSCALE_IP=$TS_IP" >> $GITHUB_ENV

      - name: Maintain Connection & Print Info
        run: |
          echo -e "\n===================================================="
          echo "   THÔNG TIN TRUY CẬP HỆ THỐNG (MÁY CHỦ WEB ACTIVE)  "
          echo "===================================================="
          echo " IP Tailscale của bạn: $TAILSCALE_IP"
          echo " Mật khẩu dùng chung : $SSH_PASSWORD"
          echo "----------------------------------------------------"
          echo " 1. TRUY CẬP POSTGRES TRÊN TRÌNH DUYỆT (WEB):"
          echo "    --> Đường dẫn: http://$TAILSCALE_IP/pgadmin4"
          echo "    --> Email tài khoản: admin@gh-actions.local"
          echo "    --> Mật khẩu       : $SSH_PASSWORD"
          echo "----------------------------------------------------"
          echo " 2. KẾT NỐI SSH / BITVISE:"
          echo "    --> Host: $TAILSCALE_IP  | Port: 22"
          echo "    --> User: runner         | Mật khẩu: $SSH_PASSWORD"
          echo "----------------------------------------------------"
          echo " 3. THÔNG TIN DATABASE (Để Add vào pgAdmin Web):"
          echo "    --> Host: localhost      | Port: 5432"
          echo "    --> User: postgres       | Mật khẩu: $SSH_PASSWORD"
          echo "====================================================\n"
          
          while true; do
              echo "[$(date)] Hệ thống đang chạy ổn định. Sẵn sàng kết nối Web & SSH..."
              sleep 300
          done
